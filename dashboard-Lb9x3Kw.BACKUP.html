<title>Laboy Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#000000;
    --card:#111827;
    --border:#1f2937;
    --text:#f1f5f9;
    --muted:#64748b;
    --accent-mlb:#e63946;
    --accent-bsn:#f97316;
    --accent-nba:#3b82f6;
    --green:#22c55e;
    --radius:14px;
  }
  html,body{min-height:100%;background:var(--bg);color:var(--text);
            font-family:'Inter',system-ui,sans-serif;
            padding-bottom:env(safe-area-inset-bottom,0)}

  /* ── HEADER ── */
  .header{
    text-align:center;padding:32px 20px 24px;
    background:transparent;
  }
  .tagline{font-size:0.72rem;color:var(--muted);margin-top:6px;letter-spacing:.04em;text-transform:uppercase}

  /* ── SPORT SECTIONS ── */
  .sections{display:flex;flex-direction:column;gap:0;max-width:540px;margin:0 auto;padding:0 12px}

  .sport-section{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    margin-bottom:16px;
    overflow:hidden;
  }

  .sport-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--border);
  }
  .sport-title{
    display:flex;align-items:center;gap:10px;
    font-size:1.05rem;font-weight:700;
  }
  .sport-badge{
    width:36px;height:36px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;flex-shrink:0;
  }
  .sport-badge img{width:28px;height:28px;object-fit:contain}
  .mlb .sport-badge{background:#e6394615}
  .bsn .sport-badge{background:#f9731615}
  .nba .sport-badge{background:#3b82f615}

  .refresh-btn{
    background:transparent;border:1px solid var(--border);
    color:var(--muted);border-radius:8px;padding:6px 12px;
    font-size:0.75rem;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:5px;
    transition:all .2s;
  }
  .refresh-btn:hover{border-color:#60a5fa;color:#60a5fa}
  .refresh-btn:active{transform:scale(.95)}
  .refresh-btn svg{width:13px;height:13px}

  /* ── FILE GROUPS ── */
  .sport-body{padding:0}

  .file-group{padding:0}
  .group-label{
    font-size:0.68rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted);
    padding:10px 18px 6px;
  }

  .file-link{
    display:flex;align-items:center;justify-content:space-between;
    padding:11px 18px;text-decoration:none;color:var(--text);
    border-top:1px solid #1a2030;
    transition:background .15s;
  }
  .file-link:hover{background:#151d2a}
  .file-link:active{background:#1c2840}

  .file-info{display:flex;align-items:center;gap:10px}
  .file-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0}
  .file-name{font-size:0.88rem;font-weight:600}
  .file-date{font-size:0.72rem;color:var(--muted);margin-top:1px}
  .chevron{color:var(--muted);font-size:0.7rem;flex-shrink:0}

  /* ── MODEL CARD block ── */
  .model-card-row{
    display:flex;gap:10px;padding:12px 18px;border-top:1px solid #1a2030;
  }
  .mc-link{
    flex:1;background:#0d1520;border:1px solid var(--border);
    border-radius:10px;padding:10px 14px;text-decoration:none;
    color:var(--text);transition:border-color .2s,background .2s;
  }
  .mc-link:hover{border-color:#475569;background:#111f30}
  .mc-empty{opacity:.45;pointer-events:none;cursor:default}

  /* ── MIS PICKS image grid ── */
  .picks-img-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    padding:10px 18px 14px;border-top:1px solid #1a2030;
  }
  .pick-img-tile{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    text-decoration:none;color:var(--text);
    background:#0d1520;border:1px solid var(--border);border-radius:8px;
    overflow:hidden;transition:border-color .2s;
  }
  .pick-img-tile:hover{border-color:#f97316}
  .pick-img-tile img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
  .pick-img-label{font-size:0.65rem;font-weight:700;padding:3px 6px 0;color:var(--text)}
  .pick-img-date{font-size:0.6rem;color:var(--muted);padding:0 6px 6px}
  .mc-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;
             letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
  .mc-val{font-size:0.82rem;font-weight:600}

  /* ── LOADING / EMPTY ── */
  .loading{
    display:flex;align-items:center;gap:8px;
    padding:16px 18px;font-size:0.82rem;color:var(--muted);
  }
  .spinner{
    width:14px;height:14px;border:2px solid var(--border);
    border-top-color:var(--accent-bsn);border-radius:50%;
    animation:spin .7s linear infinite;flex-shrink:0;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .empty{padding:14px 18px;font-size:0.8rem;color:var(--muted);font-style:italic}

  /* ── FOOTER ── */
  .footer{
    text-align:center;padding:24px 16px 32px;
    font-size:0.68rem;color:#334155;
  }

  /* ── SPINNING refresh icon ── */
  .spin-icon{display:inline-block;animation:spin .6s linear infinite}
</style>
</head>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5"/>

<div class="footer">Solo tú tienes esta URL · No la compartas<br>
  <span id="last-updated" style="margin-top:4px;display:block"></span>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const MANIFESTS = {
  mlb: 'https://laboywebsite-lgtm.github.io/mlb-picks/manifest.json',
  bsn: 'https://laboywebsite-lgtm.github.io/bsn-picks/manifest.json',
  nba: 'https://laboywebsite-lgtm.github.io/nba-picks/manifest.json',
};

const SPORT_LABELS = {
  mlb: { picks: '⚾ Picks del Modelo', lines: '📊 Lines del Modelo', record: '🏆 Model Card' },
  bsn: { picks: '🏀 Picks del Modelo', lines: '📊 Lines del Modelo', record: '🏆 Model Card' },
  nba: { picks: '🏆 Picks del Modelo', lines: '📊 Lines del Modelo', record: '🎖️ Model Card' },
};

// ── Fetch manifest and render section ───────────────────────────────────────
async function loadSport(sport, animate) {
  const bodyEl = document.getElementById('body-' + sport);
  const btn    = document.querySelector('#sect-' + sport + ' .refresh-btn');

  if (animate && btn) {
    btn.innerHTML = '<span class="spin-icon">↻</span>';
    btn.disabled  = true;
  }

  bodyEl.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';

  try {
    const url  = MANIFESTS[sport] + '?cb=' + Date.now();
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    renderSport(sport, data, bodyEl);
  } catch (e) {
    bodyEl.innerHTML = '<div class="empty">No hay archivos publicados aún.<br><small style="color:#475569">' + e.message + '</small></div>';
  } finally {
    if (animate && btn) {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5"/></svg> Refresh';
      btn.disabled = false;
    }
  }
}

// ── Render sport body ────────────────────────────────────────────────────────
function renderSport(sport, data, el) {
  const files  = data.files || [];
  const labels = SPORT_LABELS[sport];

  // Group by type, keep latest 3 per type
  const groups = { picks: [], lines: [], record: [] };
  for (const f of files) {
    const t = f.type;
    if (groups[t] && groups[t].length < 3) groups[t].push(f);
  }

  let html = '';

  // ── Picks + Lines ─────────────────────────────────────────────────────────
  for (const gtype of ['picks', 'lines']) {
    const items = groups[gtype];
    if (!items.length) continue;
    html += `<div class="file-group"><div class="group-label">${labels[gtype]}</div>`;
    for (const f of items) {
      const icon = gtype === 'picks' ? '🎯' : '📊';
      const fileDateFmt = f.date
        ? (([y,m,d]) => `${m}-${d}-${y}`)(f.date.split('-'))
        : f.name.replace(/\.html$/, '');
      const typeLabel = gtype === 'picks' ? 'Picks' : 'Líneas';
      html += `
        <a class="file-link" href="${f.url}" target="_blank">
          <div class="file-info">
            <span class="file-icon">${icon}</span>
            <div>
              <div class="file-name">${fileDateFmt}</div>
              <div class="file-date">${typeLabel}</div>
            </div>
          </div>
          <span class="chevron">›</span>
        </a>`;
    }
    html += '</div>';
  }

  // ── Model Card ────────────────────────────────────────────────────────────
  const recordItems = groups['record'];
  const myRecords    = recordItems.filter(f => f.subtype === 'my_record'    || (!f.subtype && !f.name.includes('Model Record')));
  const modelRecords = recordItems.filter(f => f.subtype === 'model_record' || (!f.subtype &&  f.name.includes('Model Record')));

  html += `<div class="file-group"><div class="group-label">${labels.record}</div>`;

  // Row: Record - Mis Picks
  const myRec = myRecords[0];
  // Row: Record - Picks del Modelo
  const modRec = modelRecords[0];

  if (myRec || modRec) {
    html += '<div class="model-card-row">';
    if (myRec) {
      html += `
        <a class="mc-link" href="${myRec.url}" target="_blank">
          <div class="mc-label">📝 Record — Mis Picks</div>
          <div class="mc-val">${formatDate(myRec.date || '')}</div>
        </a>`;
    } else {
      html += `<div class="mc-link mc-empty"><div class="mc-label" style="color:#475569">📝 Record — Mis Picks</div><div class="mc-val">—</div></div>`;
    }
    if (modRec) {
      html += `
        <a class="mc-link" href="${modRec.url}" target="_blank">
          <div class="mc-label">📈 Record — Modelo</div>
          <div class="mc-val">${formatDate(modRec.date || '')}</div>
        </a>`;
    } else {
      html += `<div class="mc-link mc-empty"><div class="mc-label" style="color:#475569">📈 Record — Modelo</div><div class="mc-val">—</div></div>`;
    }
    html += '</div>';
  } else {
    html += `<div class="empty" style="padding:10px 18px">Sin datos publicados</div>`;
  }
  html += '</div>';

  // ── Mis Picks (images) ────────────────────────────────────────────────────
  const imgItems = (data.files || []).filter(f => f.type === 'mypick_img');
  if (imgItems.length) {
    html += `<div class="file-group">
      <div class="group-label">📸 Mis Picks</div>
      <div class="picks-img-grid">`;
    for (const f of imgItems) {
      const fileDateFmt = f.date
        ? (([y,m,d]) => `${m}-${d}-${y}`)(f.date.split('-'))
        : f.name.replace(/\.(jpg|png)$/i, '');
      // Extract pick number if present (#N)
      const numMatch = f.name.match(/#(\d+)/);
      const label = numMatch ? `Pick #${numMatch[1]}` : fileDateFmt;
      html += `
        <a class="pick-img-tile" href="${f.url}" target="_blank" download="${f.name}">
          <img src="${f.url}" alt="${label}" loading="lazy" onerror="this.parentNode.style.display='none'">
          <div class="pick-img-label">${label}</div>
          <div class="pick-img-date">${fileDateFmt} ↓</div>
        </a>`;
    }
    html += `</div></div>`;
  }

  if (!html) {
    el.innerHTML = '<div class="empty">No hay archivos publicados aún.</div>';
  } else {
    el.innerHTML = html;
  }
}

// ── Date formatter ───────────────────────────────────────────────────────────
function formatDate(d) {
  if (!d) return '—';
  try {
    const [y, m, day] = d.split('-').map(Number);
    const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${months[m-1]} ${day}, ${y}`;
  } catch { return d; }
}

// ── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  loadSport('mlb');
  loadSport('bsn');
  loadSport('nba');
  document.getElementById('last-updated').textContent =
    'Cargado: ' + new Date().toLocaleTimeString('es-PR', {hour:'2-digit',minute:'2-digit'});
})();
</script>
